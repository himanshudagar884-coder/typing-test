<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typing Master Ultra</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
            overflow: hidden; /* Prevents the whole page from shaking */
        }
        .container { width: 100%; max-width: 500px; }
        h1 { color: #38bdf8; text-align: center; font-size: 1.5rem; margin: 10px 0; }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }
        .stat-value { display: block; font-size: 1.1rem; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; }

        .typing-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            line-height: 2; /* Increased line height for better visibility */
            font-size: 1.25rem;
            height: 240px;
            border: 2px solid #334155;
            position: relative;
            margin-bottom: 20px;
            word-wrap: break-word;
            overflow-y: scroll; /* Force scrollbar to prevent layout jumps */
            scroll-behavior: smooth;
        }

        .char-untouched { color: #64748b; }
        .char-correct { color: #4ade80; }
        .char-incorrect { background-color: #ef4444; color: white; border-radius: 2px; }
        .char-current { 
            border-bottom: 3px solid #38bdf8; 
            background-color: rgba(56, 189, 248, 0.2); 
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Typing Test Pro</h1>
        <div class="stats-bar">
            <div style="text-align:center">
                <span id="wpm" class="stat-value">0</span>
                <span class="stat-label">WPM</span>
            </div>
            <div style="text-align:center">
                <span id="timer" class="stat-value">0</span>
                <span class="stat-label">Seconds</span>
            </div>
        </div>

        <div id="display-container" class="typing-box" onclick="focusInput()">
            Tap START for fresh English text...
        </div>

        <input type="text" id="hidden-input" autocomplete="off" spellcheck="false">
        <button id="action-btn">START TEST</button>
    </div>

    <script>
        const displayContainer = document.getElementById('display-container');
        const hiddenInput = document.getElementById('hidden-input');
        const actionBtn = document.getElementById('action-btn');
        const wpmDisplay = document.getElementById('wpm');
        const timerDisplay = document.getElementById('timer');

        // New, more reliable mechanical click sound
        const typeSound = new Audio('https://www.soundjay.com/communication/typewriter-key-1.mp3');
        typeSound.load(); 

        let startTime, timerInterval;
        let isRunning = false;
        let targetQuote = "";

        function focusInput() {
            hiddenInput.focus();
        }

        async function fetchOnlineText() {
            displayContainer.innerHTML = "Fetching long English text...";
            try {
                const response = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary');
                const data = await response.json();
                let text = data.extract;
                
                // Fetch a second one to ensure ~300 words
                const response2 = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary');
                const data2 = await response2.json();
                text += " " + data2.extract;

                targetQuote = text.replace(/[\r\n]+/g, " ").trim();
                renderChars();
            } catch (e) {
                displayContainer.innerHTML = "Error. Tap RESTART.";
            }
        }

        function renderChars() {
            displayContainer.innerHTML = "";
            targetQuote.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char;
                span.classList.add('char-untouched');
                displayContainer.appendChild(span);
            });
            if(displayContainer.firstChild) displayContainer.firstChild.classList.add('char-current');
        }

        function startTest() {
            // CRITICAL: Unlocks sound for Android/iOS
            typeSound.play().then(() => {
                typeSound.pause();
                typeSound.currentTime = 0;
            }).catch(() => {});

            isRunning = false;
            clearInterval(timerInterval);
            
            fetchOnlineText().then(() => {
                hiddenInput.value = "";
                focusInput();
                wpmDisplay.innerText = "0";
                timerDisplay.innerText = "0";
                startTime = new Date();
                isRunning = true;
                actionBtn.innerText = "RESTART";
                timerInterval = setInterval(updateStats, 1000);
            });
        }

        function updateStats() {
            const timePassed = Math.floor((new Date() - startTime) / 1000);
            timerDisplay.innerText = timePassed;
            if (timePassed > 0) {
                const charCount = hiddenInput.value.length;
                const wpm = Math.round((charCount / 5) / (timePassed / 60));
                wpmDisplay.innerText = wpm > 0 ? wpm : 0;
            }
        }

        hiddenInput.addEventListener('input', (e) => {
            // Fast Sound Playback
            const sound = typeSound.cloneNode();
            sound.volume = 0.5;
            sound.play();

            const arrayChars = displayContainer.querySelectorAll('span');
            const arrayInput = hiddenInput.value.split('');
            let currentSpan = null;

            arrayChars.forEach((charSpan, index) => {
                const character = arrayInput[index];
                charSpan.classList.remove('char-correct', 'char-incorrect', 'char-current');
                
                if (character == null) {
                    charSpan.classList.add('char-untouched');
                    if (index === arrayInput.length) {
                        charSpan.classList.add('char-current');
                        currentSpan = charSpan;
                    }
                } else if (character === charSpan.innerText) {
                    charSpan.classList.add('char-correct');
                } else {
                    charSpan.classList.add('char-incorrect');
                }
            });

            // FIXED SCROLL: Only scrolls if the current letter moves out of view
            if (currentSpan) {
                const parent = displayContainer;
                const spanTop = currentSpan.offsetTop - parent.offsetTop;
                const spanHeight = currentSpan.offsetHeight;
                
                // Keep the current line in the middle of the box
                parent.scrollTop = spanTop - (parent.offsetHeight / 2) + (spanHeight / 2);
            }

            if (hiddenInput.value.length >= targetQuote.length) {
                clearInterval(timerInterval);
                alert(`Done! ${wpmDisplay.innerText} WPM`);
                isRunning = false;
            }
        });

        actionBtn.onclick = startTest;
    </script>
</body>
</html>
