<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typing Master Ultra</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        .container { width: 100%; max-width: 500px; }
        h1 { color: #38bdf8; text-align: center; font-size: 1.4rem; margin: 5px 0; }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #334155;
        }
        .stat-value { display: block; font-size: 1.2rem; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; }

        .typing-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            line-height: 2.2;
            font-size: 1.3rem;
            height: 200px; /* Adjusted for mobile keyboards */
            border: 2px solid #334155;
            position: relative;
            margin-bottom: 15px;
            word-wrap: break-word;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .char-untouched { color: #64748b; }
        .char-correct { color: #4ade80; }
        .char-incorrect { background-color: #ef4444; color: white; border-radius: 2px; }
        .char-current { border-bottom: 3px solid #38bdf8; background: rgba(56, 189, 248, 0.2); }

        #hidden-input {
            position: fixed; /* Fixed prevents layout jumps */
            top: -100px;
            left: -100px;
            opacity: 0;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Typing Test Pro</h1>
        <div class="stats-bar">
            <div><span id="wpm" class="stat-value">0</span><span class="stat-label">WPM</span></div>
            <div><span id="timer" class="stat-value">0</span><span class="stat-label">Sec</span></div>
        </div>

        <div id="display-container" class="typing-box" onclick="focusInput()">
            Loading typing challenge...
        </div>

        <input type="text" id="hidden-input" autocomplete="off" spellcheck="false">
        <button id="action-btn">START TEST</button>
    </div>

    <script>
        const displayContainer = document.getElementById('display-container');
        const hiddenInput = document.getElementById('hidden-input');
        const actionBtn = document.getElementById('action-btn');
        const wpmDisplay = document.getElementById('wpm');
        const timerDisplay = document.getElementById('timer');

        // Web Audio Setup for "Typing.com" instant sound
        let audioCtx, soundBuffer;
        const soundUrl = 'https://www.soundjay.com/communication/typewriter-key-1.mp3';

        async function setupAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const response = await fetch(soundUrl);
                const arrayBuffer = await response.arrayBuffer();
                soundBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            }
        }

        function playKeySound() {
            if (audioCtx && soundBuffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = soundBuffer;
                source.connect(audioCtx.destination);
                source.start(0);
            }
        }

        let startTime, timerInterval, targetQuote = "";
        let isRunning = false;

        function focusInput() { hiddenInput.focus(); }

        async function getWikiText() {
            displayContainer.innerHTML = "Fetching English text...";
            try {
                const r = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary');
                const d = await r.json();
                const r2 = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary');
                const d2 = await r2.json();
                targetQuote = (d.extract + " " + d2.extract).replace(/[\r\n]+/g, " ").trim();
                render();
            } catch (e) {
                displayContainer.innerHTML = "Connect to Internet and Restart.";
            }
        }

        function render() {
            displayContainer.innerHTML = "";
            targetQuote.split('').forEach(c => {
                const s = document.createElement('span');
                s.innerText = c;
                s.className = 'char-untouched';
                displayContainer.appendChild(s);
            });
            displayContainer.firstChild.classList.add('char-current');
        }

        actionBtn.onclick = async () => {
            // Unlocks audio for mobile
            await setupAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            clearInterval(timerInterval);
            await getWikiText();
            
            hiddenInput.value = "";
            focusInput();
            startTime = new Date();
            isRunning = true;
            actionBtn.innerText = "RESTART";
            timerInterval = setInterval(update, 1000);
        };

        function update() {
            const sec = Math.floor((new Date() - startTime) / 1000);
            timerDisplay.innerText = sec;
            if (sec > 0) {
                const wpm = Math.round((hiddenInput.value.length / 5) / (sec / 60));
                wpmDisplay.innerText = wpm > 0 ? wpm : 0;
            }
        }

        hiddenInput.oninput = () => {
            if (!isRunning) return;
            playKeySound();

            const chars = displayContainer.querySelectorAll('span');
            const val = hiddenInput.value.split('');
            let cur = null;

            chars.forEach((s, i) => {
                const v = val[i];
                s.className = 'char-untouched';
                if (v == null) {
                    if (i === val.length) {
                        s.classList.add('char-current');
                        cur = s;
                    }
                } else {
                    s.classList.add(v === s.innerText ? 'char-correct' : 'char-incorrect');
                }
            });

            // FIXED SCROLL LOGIC
            if (cur) {
                const box = displayContainer;
                const offset = cur.offsetTop - box.offsetTop;
                box.scrollTop = offset - (box.clientHeight / 2);
            }

            if (hiddenInput.value.length >= targetQuote.length) {
                clearInterval(timerInterval);
                alert("WPM: " + wpmDisplay.innerText);
                isRunning = false;
            }
        };
    </script>
</body>
</html>
