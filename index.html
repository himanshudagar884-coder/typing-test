<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Master Pro</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; }
        h1 { color: #38bdf8; text-align: center; font-size: 1.5rem; }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .stat-value { display: block; font-size: 1.1rem; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; }

        /* Unified Display Box */
        .typing-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 1.2rem;
            min-height: 200px;
            border: 2px solid #334155;
            position: relative;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        /* Color States */
        .char-correct { color: #4ade80; } /* Green */
        .char-incorrect { background-color: #ef4444; color: white; } /* Red BG */
        .char-current { border-bottom: 3px solid #38bdf8; } /* Cursor underline */
        .char-untouched { color: #94a3b8; } /* Grey/Black */

        /* Hidden Input - This catches your phone keyboard input */
        #hidden-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Typing Test Pro</h1>
        
        <div class="stats-bar">
            <div style="text-align:center">
                <span id="wpm" class="stat-value">0</span>
                <span class="stat-label">WPM</span>
            </div>
            <div style="text-align:center">
                <span id="timer" class="stat-value">0</span>
                <span class="stat-label">Seconds</span>
            </div>
        </div>

        <div id="display-container" class="typing-box" onclick="focusInput()">
            Click START to load text...
        </div>

        <input type="text" id="hidden-input" autocomplete="off" autofocus>

        <button id="action-btn">START TEST</button>
    </div>

    <script>
        const displayContainer = document.getElementById('display-container');
        const hiddenInput = document.getElementById('hidden-input');
        const actionBtn = document.getElementById('action-btn');
        const wpmDisplay = document.getElementById('wpm');
        const timerDisplay = document.getElementById('timer');

        let startTime, timerInterval;
        let isRunning = false;
        let targetQuote = "";

        // Forces the mobile keyboard to stay open
        function focusInput() {
            hiddenInput.focus();
        }

        async function fetchNewParagraph() {
            displayContainer.innerHTML = "Loading...";
            try {
                const response = await fetch('https://metaphorpsum.com/sentences/3');
                targetQuote = (await response.text()).trim();
                renderChars();
            } catch (e) {
                displayContainer.innerHTML = "Check your internet connection.";
            }
        }

        // Breaks the paragraph into individual span letters
        function renderChars() {
            displayContainer.innerHTML = "";
            targetQuote.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char;
                span.classList.add('char-untouched');
                displayContainer.appendChild(span);
            });
        }

        function startTest() {
            fetchNewParagraph().then(() => {
                hiddenInput.value = "";
                hiddenInput.disabled = false;
                focusInput();
                
                wpmDisplay.innerText = "0";
                timerDisplay.innerText = "0";
                startTime = new Date();
                isRunning = true;
                actionBtn.innerText = "RESTART";
                
                clearInterval(timerInterval);
                timerInterval = setInterval(updateStats, 1000);
            });
        }

        function updateStats() {
            const timePassed = Math.floor((new Date() - startTime) / 1000);
            timerDisplay.innerText = timePassed;
            if (timePassed > 0) {
                const charCount = hiddenInput.value.length;
                const wpm = Math.round((charCount / 5) / (timePassed / 60));
                wpmDisplay.innerText = wpm > 0 ? wpm : 0;
            }
        }

        hiddenInput.addEventListener('input', () => {
            const arrayChars = displayContainer.querySelectorAll('span');
            const arrayInput = hiddenInput.value.split('');

            arrayChars.forEach((charSpan, index) => {
                const character = arrayInput[index];
                
                // Reset classes
                charSpan.classList.remove('char-correct', 'char-incorrect', 'char-current');
                
                if (character == null) {
                    // Not typed yet
                    charSpan.classList.add('char-untouched');
                    if (index === arrayInput.length) charSpan.classList.add('char-current');
                } else if (character === charSpan.innerText) {
                    // Typed correctly
                    charSpan.classList.add('char-correct');
                } else {
                    // Typed wrongly
                    charSpan.classList.add('char-incorrect');
                }
            });

            // Check if finished
            if (hiddenInput.value === targetQuote) {
                clearInterval(timerInterval);
                alert(`Perfect! Speed: ${wpmDisplay.innerText} WPM`);
                isRunning = false;
                actionBtn.innerText = "START NEW";
            }
        });

        actionBtn.onclick = startTest;
    </script>
</body>
</html>
