<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Master Ultra</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; }
        h1 { color: #38bdf8; text-align: center; font-size: 1.5rem; }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .stat-value { display: block; font-size: 1.1rem; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; }

        .typing-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            line-height: 1.8;
            font-size: 1.2rem;
            height: 300px; /* Fixed height for auto-scroll testing */
            border: 2px solid #334155;
            position: relative;
            margin-bottom: 20px;
            word-wrap: break-word;
            overflow-y: auto; /* This allows the box to scroll */
            scroll-behavior: smooth;
        }

        .char-correct { color: #4ade80; }
        .char-incorrect { background-color: #ef4444; color: white; border-radius: 2px; }
        .char-current { border-bottom: 3px solid #38bdf8; background-color: rgba(56, 189, 248, 0.2); }
        .char-untouched { color: #94a3b8; }

        #hidden-input {
            position: absolute;
            opacity: 0;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Typing Master 300</h1>
        
        <div class="stats-bar">
            <div style="text-align:center">
                <span id="wpm" class="stat-value">0</span>
                <span class="stat-label">WPM</span>
            </div>
            <div style="text-align:center">
                <span id="timer" class="stat-value">0</span>
                <span class="stat-label">Seconds</span>
            </div>
        </div>

        <div id="display-container" class="typing-box" onclick="focusInput()">
            Click START to load challenge...
        </div>

        <input type="text" id="hidden-input" autocomplete="off" spellcheck="false">

        <button id="action-btn">START TEST</button>
    </div>

    <script>
        const displayContainer = document.getElementById('display-container');
        const hiddenInput = document.getElementById('hidden-input');
        const actionBtn = document.getElementById('action-btn');
        const wpmDisplay = document.getElementById('wpm');
        const timerDisplay = document.getElementById('timer');

        let startTime, timerInterval;
        let isRunning = false;
        let targetQuote = "";

        // Using a more reliable sound link
        const typeSound = new Audio('https://codeskulptor-demos.commondatastorage.googleapis.com/pang/pop.mp3');

        function focusInput() {
            hiddenInput.focus();
        }

        async function fetchLongParagraph() {
            displayContainer.innerHTML = "Generating 300 words...";
            try {
                // Fetching exactly 3 long paragraphs to reach ~300 words
                const response = await fetch('https://baconipsum.com/api/?type=all-meat&paras=3&start-with-lorem=1');
                const data = await response.json();
                targetQuote = data.join(" ");
                renderChars();
            } catch (e) {
                targetQuote = "Check internet and try again.";
                renderChars();
            }
        }

        function renderChars() {
            displayContainer.innerHTML = "";
            targetQuote.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char;
                span.classList.add('char-untouched');
                displayContainer.appendChild(span);
            });
            if(displayContainer.firstChild) displayContainer.firstChild.classList.add('char-current');
        }

        function startTest() {
            // "Wake up" the sound engine for mobile
            typeSound.play(); 
            typeSound.pause();

            isRunning = false;
            clearInterval(timerInterval);
            fetchLongParagraph().then(() => {
                hiddenInput.value = "";
                focusInput();
                wpmDisplay.innerText = "0";
                timerDisplay.innerText = "0";
                startTime = new Date();
                isRunning = true;
                actionBtn.innerText = "RESTART";
                timerInterval = setInterval(updateStats, 1000);
            });
        }

        function updateStats() {
            const timePassed = Math.floor((new Date() - startTime) / 1000);
            timerDisplay.innerText = timePassed;
            if (timePassed > 0) {
                const charCount = hiddenInput.value.length;
                const wpm = Math.round((charCount / 5) / (timePassed / 60));
                wpmDisplay.innerText = wpm > 0 ? wpm : 0;
            }
        }

        hiddenInput.addEventListener('input', () => {
            // Play sound
            typeSound.currentTime = 0;
            typeSound.play().catch(e => console.log("Sound blocked"));

            const arrayChars = displayContainer.querySelectorAll('span');
            const arrayInput = hiddenInput.value.split('');
            let currentSpan = null;

            arrayChars.forEach((charSpan, index) => {
                const character = arrayInput[index];
                charSpan.classList.remove('char-correct', 'char-incorrect', 'char-current');
                
                if (character == null) {
                    charSpan.classList.add('char-untouched');
                    if (index === arrayInput.length) {
                        charSpan.classList.add('char-current');
                        currentSpan = charSpan; // Track current cursor position
                    }
                } else if (character === charSpan.innerText) {
                    charSpan.classList.add('char-correct');
                } else {
                    charSpan.classList.add('char-incorrect');
                }
            });

            // AUTO-SCROLL LOGIC
            if (currentSpan) {
                const containerRect = displayContainer.getBoundingClientRect();
                const spanRect = currentSpan.getBoundingClientRect();
                
                // If the current letter is near the bottom of the box, scroll down
                if (spanRect.bottom > containerRect.bottom - 50) {
                    displayContainer.scrollTop += 30;
                }
                // If you backspace and go up
                if (spanRect.top < containerRect.top + 50) {
                    displayContainer.scrollTop -= 30;
                }
            }

            if (hiddenInput.value.length >= targetQuote.length) {
                clearInterval(timerInterval);
                alert(`Finished! WPM: ${wpmDisplay.innerText}`);
                isRunning = false;
            }
        });

        actionBtn.onclick = startTest;
    </script>
</body>
</html>
