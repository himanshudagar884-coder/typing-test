<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Test</title>

<style>
body {
    background:#0f172a;
    color:#fff;
    font-family: monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.container {
    width:90%;
    max-width:500px;
    text-align:center;
}
h1 { color:#38bdf8; }

textarea {
    width:100%;
    height:200px;
    padding:10px;
    border-radius:10px;
    border:none;
    font-size:16px;
    outline:none;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    font-weight:bold;
}

#result {
    margin-top:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<h1>Typing Speed Test</h1>

<textarea id="text" placeholder="Start typing your paragraph..."></textarea>

<button onclick="startTyping()">Start</button>
<button onclick="finishTyping()">Finish</button>

<div id="result"></div>
</div>

<script>
let startTime = null;

function startTyping(){
    document.getElementById("text").value = "";
    document.getElementById("result").innerHTML = "";
    startTime = null; // wait for first keystroke
}

/* START TIMER ON FIRST KEYSTROKE */
document.getElementById("text").addEventListener("input", () => {
    if (!startTime) {
        startTime = new Date();
    }
});

function finishTyping(){
    if(!startTime){
        alert("Start typing first");
        return;
    }

    const text = document.getElementById("text").value;
    const endTime = new Date();

    const timeInMinutes = (endTime - startTime) / 1000 / 60;

    const keystrokes = text.length; // ✅ total characters typed

    const wpm = Math.round((keystrokes / 5) / timeInMinutes);

    document.getElementById("result").innerHTML =
        "WPM: " + (wpm > 0 ? wpm : 0);
}
</script>

</body>
</html>
