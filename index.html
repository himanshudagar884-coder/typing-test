<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Master Ultra</title>

<style>
body {
    background:#0f172a;
    color:#f8fafc;
    font-family: monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.container { width:95%; max-width:500px; }

h1 { text-align:center; color:#38bdf8; }

.stats-bar {
    display:flex;
    justify-content:space-around;
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
.stat-value { font-size:18px; color:#38bdf8; }
.stat-label { font-size:12px; }

.typing-box {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    height:200px;
    overflow-y:auto;
    line-height:2;
    font-size:18px;
}

.char-untouched { color:#64748b; }
.char-correct { color:#4ade80; }
.char-incorrect { background:#ef4444; color:#fff; }
.char-current { border-bottom:2px solid #38bdf8; }

#hidden-input {
    opacity:0;
    position:absolute;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#38bdf8;
    border:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Typing Test</h1>

<div class="stats-bar">
<div><span id="wpm" class="stat-value">0</span><div class="stat-label">WPM</div></div>
<div><span id="timer" class="stat-value">0</span><div class="stat-label">SEC</div></div>
</div>

<div id="display" class="typing-box" onclick="input.focus()"></div>

<input id="input" type="text">
<button onclick="startTest()">START</button>
</div>

<script>
const display = document.getElementById("display");
const input = document.getElementById("input");
const wpmEl = document.getElementById("wpm");
const timerEl = document.getElementById("timer");

let text = "";
let startTime = null;
let timer = null;
let started = false;

/* ---------------- TEXT ---------------- */
async function getText(){
    try{
        const r = await fetch("https://api.quotable.io/random");
        const d = await r.json();
        text = d.content;
    }catch{
        text = "Practice typing daily to improve your speed and accuracy.";
    }
    render();
}

function render(){
    display.innerHTML = "";
    text.split("").forEach(c=>{
        const span = document.createElement("span");
        span.innerText = c;
        span.className = "char-untouched";
        display.appendChild(span);
    });
    display.firstChild.classList.add("char-current");
}

/* ---------------- START ---------------- */
function startTest(){
    input.value = "";
    startTime = null;
    started = false;
    timerEl.innerText = 0;
    wpmEl.innerText = 0;
    clearInterval(timer);
    input.focus();
    getText();
}

/* ---------------- TIMER ---------------- */
function startTimer(){
    startTime = new Date();
    timer = setInterval(()=>{
        const sec = Math.floor((new Date() - startTime)/1000);
        timerEl.innerText = sec;

        const correct = document.querySelectorAll(".char-correct").length;
        const wpm = Math.round((correct/5)/(sec/60));
        wpmEl.innerText = sec>0 ? wpm : 0;
    },1000);
}

/* ---------------- SOUND FIX ---------------- */
const audio = new Audio("https://www.soundjay.com/communication/typewriter-key-1.mp3");
let lastSound = 0;

function playSound(){
    const now = Date.now();
    if(now - lastSound < 80) return;
    lastSound = now;

    audio.currentTime = 0;
    audio.play().catch(()=>{});
}

/* ---------------- INPUT ---------------- */
input.addEventListener("input", ()=>{
    if(!started){
        started = true;
        startTimer(); // ✅ timer starts on first typing
    }

    playSound();

    const chars = display.querySelectorAll("span");
    const val = input.value.split("");

    chars.forEach((span, i)=>{
        span.classList.remove("char-correct","char-incorrect","char-current");

        if(val[i]==null){
            span.classList.add("char-untouched");
            if(i===val.length) span.classList.add("char-current");
        }else if(val[i]===span.innerText){
            span.classList.add("char-correct");
        }else{
            span.classList.add("char-incorrect");
        }
    });

    /* -------- AUTO SCROLL FIX -------- */
    const current = document.querySelector(".char-current");
    if(current){
        current.scrollIntoView({
            behavior:"smooth",
            block:"center"
        });
    }

    /* -------- FINISH -------- */
    if(input.value.length >= text.length){
        clearInterval(timer);
        alert("Finished! WPM: " + wpmEl.innerText);
    }
});
</script>

</body>
</html>
