<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Master Mobile</title>
    <style>
        /* Mobile-First Design */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 { color: #38bdf8; text-align: center; font-size: 1.5rem; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 1.2rem; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; }

        .display-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 80px;
            border-left: 5px solid #38bdf8;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #0f172a;
            color: white;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus { border-color: #38bdf8; }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 1rem;
        }

        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Typing Test App</h1>

        <div class="stats-bar">
            <div class="stat-item">
                <span id="wpm" class="stat-value">0</span>
                <span class="stat-label">WPM</span>
            </div>
            <div class="stat-item">
                <span id="accuracy" class="stat-value">100</span>
                <span class="stat-label">Acc %</span>
            </div>
            <div class="stat-item">
                <span id="timer" class="stat-value">0</span>
                <span class="stat-label">Secs</span>
            </div>
        </div>

        <div id="target-text" class="display-box">Click "Start" to get a paragraph!</div>

        <textarea id="input-area" placeholder="Type here..." disabled></textarea>

        <button id="action-btn">START TEST</button>
    </div>

    <script>
        const paragraphs = [
            "The best way to predict the future is to create it yourself.",
            "Success consists of going from failure to failure without loss of enthusiasm.",
            "Mobile coding is a great way to build logic and solve problems on the go.",
            "The quick brown fox jumps over the lazy dog and runs away.",
            "Quality is not an act, it is a habit that we must practice every day."
        ];

        const targetDisplay = document.getElementById('target-text');
        const inputArea = document.getElementById('input-area');
        const actionBtn = document.getElementById('action-btn');
        const wpmDisplay = document.getElementById('wpm');
        const timerDisplay = document.getElementById('timer');

        let startTime, timerInterval;
        let isRunning = false;

        function startTest() {
            const randomIdx = Math.floor(Math.random() * paragraphs.length);
            targetDisplay.innerText = paragraphs[randomIdx];
            inputArea.value = "";
            inputArea.disabled = false;
            inputArea.focus();
            
            wpmDisplay.innerText = "0";
            timerDisplay.innerText = "0";
            
            startTime = new Date();
            isRunning = true;
            actionBtn.innerText = "RESTART";
            
            clearInterval(timerInterval);
            timerInterval = setInterval(updateStats, 1000);
        }

        function updateStats() {
            const timePassed = Math.floor((new Date() - startTime) / 1000);
            timerDisplay.innerText = timePassed;

            if (timePassed > 0) {
                const words = inputArea.value.length / 5;
                const wpm = Math.round(words / (timePassed / 60));
                wpmDisplay.innerText = wpm > 0 ? wpm : 0;
            }
        }

        inputArea.addEventListener('input', () => {
            if (inputArea.value === targetDisplay.innerText) {
                clearInterval(timerInterval);
                inputArea.disabled = true;
                alert("Test Finished! WPM: " + wpmDisplay.innerText);
                isRunning = false;
                actionBtn.innerText = "START NEW";
            }
        });

        actionBtn.onclick = startTest;
    </script>
</body>
</html>
